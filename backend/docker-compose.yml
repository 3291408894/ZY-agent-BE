# ============================================================
# 智翼平台 — Docker Compose 编排
# 启动: docker compose up -d
# 停止: docker compose down
# ============================================================

version: "3.9"

services:
  # --- MySQL 数据库 ---
  mysql:
    image: mysql:8.0
    container_name: zhiyi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zhiyi
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./zy.sql:/docker-entrypoint-initdb.d/01-init.sql  # 自动建表
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # --- Redis 缓存 ---
  redis:
    image: redis:7-alpine
    container_name: zhiyi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- FastAPI 后端 ---
  backend:
    build: .
    container_name: zhiyi-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./app:/app/app  # 开发时热重载
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mysql_data:
  redis_data:
