# ============================================================
# 智翼平台 — Docker Compose 编排
# 启动: docker compose up -d
# 停止: docker compose down
# ============================================================

version: "3.9"

services:
  # --- PostgreSQL 数据库 ---
  postgres:
    image: postgres:16-alpine
    container_name: zhiyi-postgres
    environment:
      POSTGRES_DB: zhiyi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis 缓存 ---
  redis:
    image: redis:7-alpine
    container_name: zhiyi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- FastAPI 后端 ---
  backend:
    build: .
    container_name: zhiyi-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./app:/app/app  # 开发时热重载
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
